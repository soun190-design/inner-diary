<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>나의 감각 일기</title>
  <meta name="description" content="분석 말고, 지금 느끼는 것" />

  <!-- PWA -->
  <meta name="theme-color" content="#F5F0E8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="감각 일기" />
  <link rel="manifest" href="manifest.json" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F0E8; font-family: 'Georgia', serif; }
    textarea { font-family: 'Georgia', serif; }
    button { font-family: 'Georgia', serif; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // localStorage wrapper (same API shape as window.storage)
    const storage = {
      get: (key) => {
        const val = localStorage.getItem(key);
        return val ? { value: val } : null;
      },
      set: (key, value) => {
        localStorage.setItem(key, value);
        return true;
      },
      list: (prefix = "") => {
        const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix));
        return { keys };
      }
    };

    const SLOTS = [
      {
        id: "morning", label: "아침", emoji: "🌤", hours: [6,7,8,9,10],
        description: "하루가 시작되는 지금",
        questions: [
          "눈 뜨고 지금 몸이 어때? 무겁거나 가볍거나, 그냥 느껴지는 대로.",
          "오늘 하루 어떤 기분으로 있고 싶어?",
          "지금 이 순간 머릿속에 가장 먼저 떠오르는 게 뭐야?",
        ],
      },
      {
        id: "lunch", label: "점심", emoji: "☀️", hours: [11,12,13,14],
        description: "오전을 보낸 지금",
        questions: [
          "지금 몸이 어때? 가볍고 싶어, 든든하고 싶어?",
          "오전에 가장 기억에 남는 순간이 있어?",
          "지금 진짜 먹고 싶은 거, 효율 말고 그냥 느낌으로 말해봐.",
        ],
      },
      {
        id: "afterwork", label: "퇴근", emoji: "🌆", hours: [17,18,19,20],
        description: "하루 일이 끝나는 지금",
        questions: [
          "오늘 하루 몸이랑 마음에 뭐가 남아있어?",
          "찜찜하게 남아있는 게 있어, 아니면 홀가분해?",
          "지금 이 순간 가장 하고 싶은 게 뭐야?",
        ],
      },
      {
        id: "bedtime", label: "자기 전", emoji: "🌙", hours: [21,22,23,0],
        description: "하루를 마무리하는 지금",
        questions: [
          "오늘 가장 편했던 순간이 언제야?",
          "오늘 내가 진짜 원해서 한 게 있었어?",
          "지금 느끼는 걸 분석 말고, 그냥 한 문장으로 말해봐.",
        ],
      },
    ];

    const DAYS = ["일","월","화","수","목","금","토"];

    function getWeekRange(offsetWeeks = 0) {
      const now = new Date();
      const day = now.getDay();
      const monday = new Date(now);
      monday.setDate(now.getDate() - ((day + 6) % 7) + offsetWeeks * 7);
      monday.setHours(0, 0, 0, 0);
      return { monday };
    }

    function dateKey(date) {
      return date.toISOString().split("T")[0];
    }

    function getCurrentSlot() {
      const hour = new Date().getHours();
      return SLOTS.find(s => s.hours.includes(hour)) || null;
    }

    const C = {
      bg: "#F5F0E8", paper: "#FFFDF7", ink: "#2C2416",
      inkLight: "#7A6E5F", accent: "#C17D4A", accentLight: "#E8D5BE",
      green: "#5A7A5A", border: "#E0D8CC",
    };

    const S = {
      root: { minHeight: "100vh", background: C.bg, fontFamily: "'Georgia', serif" },
      page: { maxWidth: 480, margin: "0 auto", padding: "28px 20px 80px", minHeight: "100vh" },
      homeHeader: { textAlign: "center", marginBottom: 32, paddingTop: 16 },
      dateLabel: { fontSize: 13, color: C.inkLight, letterSpacing: "0.08em", marginBottom: 8 },
      title: { fontSize: 28, fontWeight: "bold", color: C.ink, marginBottom: 6, letterSpacing: "-0.02em" },
      subtitle: { fontSize: 14, color: C.inkLight, fontStyle: "italic" },
      slotGrid: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 },
      slotCard: { background: C.paper, border: `1.5px solid ${C.border}`, borderRadius: 16, padding: "20px 16px", textAlign: "left", cursor: "pointer", width: "100%" },
      slotCardActive: { border: `2px solid ${C.accent}`, background: "#FFFAF3", boxShadow: `0 4px 20px rgba(193,125,74,0.15)` },
      slotCardDone: { opacity: 0.72 },
      slotEmoji: { fontSize: 24, marginBottom: 8, display: "block" },
      slotLabel: { fontSize: 16, fontWeight: "bold", color: C.ink, marginBottom: 4 },
      slotDesc: { fontSize: 11, color: C.inkLight, lineHeight: 1.4 },
      doneBadge: { marginTop: 10, fontSize: 11, color: C.green, fontWeight: "bold" },
      currentBadge: { marginTop: 10, fontSize: 11, color: C.accent, fontWeight: "bold" },
      weeklyBtn: { width: "100%", padding: "14px", background: C.ink, color: C.bg, border: "none", borderRadius: 12, fontSize: 15, cursor: "pointer" },
      backBtn: { background: "none", border: "none", color: C.inkLight, fontSize: 14, cursor: "pointer", padding: "0 0 20px" },
      checkinTop: { marginBottom: 32 },
      slotBadge: { fontSize: 15, color: C.accent, fontWeight: "bold", marginBottom: 12 },
      progressBar: { height: 3, background: C.border, borderRadius: 4, overflow: "hidden", marginBottom: 6 },
      progressFill: (pct) => ({ height: "100%", background: C.accent, borderRadius: 4, width: `${pct}%`, transition: "width 0.4s ease" }),
      stepCount: { fontSize: 12, color: C.inkLight, textAlign: "right" },
      questionBox: { background: C.paper, border: `1px solid ${C.border}`, borderRadius: 16, padding: "24px 20px", marginBottom: 20 },
      questionText: { fontSize: 17, color: C.ink, lineHeight: 1.7, fontStyle: "italic" },
      textarea: { width: "100%", minHeight: 120, padding: "16px", background: C.paper, border: `1.5px solid ${C.border}`, borderRadius: 12, fontSize: 15, color: C.ink, lineHeight: 1.7, resize: "none", outline: "none" },
      nextBtn: (disabled) => ({ width: "100%", padding: "15px", background: C.accent, color: "#fff", border: "none", borderRadius: 12, fontSize: 16, cursor: disabled ? "not-allowed" : "pointer", fontWeight: "bold", opacity: disabled ? 0.35 : 1 }),
      doneCenter: { paddingTop: 40, textAlign: "center" },
      doneEmoji: { fontSize: 48, marginBottom: 12 },
      doneTitle: { fontSize: 26, fontWeight: "bold", color: C.ink, marginBottom: 4 },
      doneSub: { fontSize: 14, color: C.inkLight, marginBottom: 32, fontStyle: "italic" },
      answerList: { textAlign: "left", marginBottom: 32 },
      answerItem: { marginBottom: 16, padding: "16px", background: C.paper, borderRadius: 12, border: `1px solid ${C.border}` },
      answerQ: { fontSize: 12, color: C.inkLight, marginBottom: 6, fontStyle: "italic" },
      answerA: { fontSize: 15, color: C.ink, lineHeight: 1.6 },
      homeBtn: { padding: "14px 40px", background: C.ink, color: C.bg, border: "none", borderRadius: 12, fontSize: 15, cursor: "pointer" },
      weeklyTitle: { fontSize: 22, fontWeight: "bold", color: C.ink, marginBottom: 20 },
      slotTabs: { display: "flex", gap: 8, marginBottom: 24, flexWrap: "wrap" },
      tab: { padding: "8px 14px", background: C.paper, border: `1.5px solid ${C.border}`, borderRadius: 20, fontSize: 13, color: C.inkLight, cursor: "pointer" },
      tabActive: { background: C.ink, color: C.bg, border: `1.5px solid ${C.ink}` },
      compareGrid: { display: "flex", gap: 0 },
      compareCol: { flex: 1 },
      divider: { width: 1, background: C.border, margin: "0 12px" },
      colHeader: { fontSize: 13, fontWeight: "bold", color: C.inkLight, marginBottom: 10, letterSpacing: "0.05em", textAlign: "center" },
      weekDay: { marginBottom: 8, padding: "10px 12px", background: C.paper, borderRadius: 10, border: `1px solid ${C.border}`, cursor: "pointer" },
      weekDayHeader: { display: "flex", justifyContent: "space-between", alignItems: "center" },
      weekDayLabel: { fontSize: 13, color: C.ink },
      weekDayDone: { fontSize: 12, color: C.green, fontWeight: "bold" },
      weekDayEmpty: { fontSize: 12, color: C.border },
      weekDayBody: { marginTop: 10, borderTop: `1px solid ${C.border}`, paddingTop: 10 },
      miniQ: { fontSize: 10, color: C.inkLight, fontStyle: "italic", marginBottom: 3 },
      miniA: { fontSize: 12, color: C.ink, lineHeight: 1.5, marginBottom: 8 },
    };

    function App() {
      const [view, setView] = useState("home");
      const [activeSlot, setActiveSlot] = useState(null);
      const [step, setStep] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [currentAnswer, setCurrentAnswer] = useState("");
      const [entries, setEntries] = useState({});
      const [weeklyData, setWeeklyData] = useState({ current: {}, previous: {} });
      const [compareSlot, setCompareSlot] = useState("morning");

      const currentSlot = getCurrentSlot();

      useEffect(() => { loadAllEntries(); }, []);

      function loadAllEntries() {
        const result = storage.list("entry:");
        const loaded = {};
        for (const key of result.keys || []) {
          const r = storage.get(key);
          if (r) { try { loaded[key] = JSON.parse(r.value); } catch {} }
        }
        setEntries(loaded);
        buildWeeklyData(loaded);
      }

      function buildWeeklyData(all) {
        const { monday: cMon } = getWeekRange(0);
        const { monday: pMon } = getWeekRange(-1);
        const current = {}, previous = {};
        for (let i = 0; i < 7; i++) {
          const cd = new Date(cMon); cd.setDate(cMon.getDate() + i);
          const pd = new Date(pMon); pd.setDate(pMon.getDate() + i);
          const ck = dateKey(cd), pk = dateKey(pd);
          current[ck] = {}; previous[pk] = {};
          for (const s of SLOTS) {
            const ce = all[`entry:${ck}:${s.id}`];
            const pe = all[`entry:${pk}:${s.id}`];
            if (ce) current[ck][s.id] = ce;
            if (pe) previous[pk][s.id] = pe;
          }
        }
        setWeeklyData({ current, previous });
      }

      function startCheckin(slot) {
        setActiveSlot(slot); setStep(0);
        setAnswers([]); setCurrentAnswer(""); setView("checkin");
      }

      function nextStep() {
        const newAnswers = [...answers, currentAnswer];
        setAnswers(newAnswers); setCurrentAnswer("");
        if (step + 1 >= activeSlot.questions.length) {
          saveEntry(newAnswers);
        } else { setStep(step + 1); }
      }

      function saveEntry(finalAnswers) {
        const today = dateKey(new Date());
        const key = `entry:${today}:${activeSlot.id}`;
        const entry = { date: today, slot: activeSlot.id, answers: finalAnswers, timestamp: new Date().toISOString() };
        storage.set(key, JSON.stringify(entry));
        const newEntries = { ...entries, [key]: entry };
        setEntries(newEntries); buildWeeklyData(newEntries);
        setView("done");
      }

      function getTodayEntry(slotId) {
        return entries[`entry:${dateKey(new Date())}:${slotId}`];
      }

      const progressPct = activeSlot ? ((step + 1) / activeSlot.questions.length) * 100 : 0;

      if (view === "home") {
        const now = new Date();
        const dayStr = `${now.getMonth()+1}월 ${now.getDate()}일 ${DAYS[now.getDay()]}요일`;
        return (
          <div style={S.root}>
            <div style={S.page}>
              <div style={S.homeHeader}>
                <div style={S.dateLabel}>{dayStr}</div>
                <div style={S.title}>나의 감각 일기</div>
                <div style={S.subtitle}>분석 말고, 지금 느끼는 것</div>
              </div>
              <div style={S.slotGrid}>
                {SLOTS.map(slot => {
                  const done = getTodayEntry(slot.id);
                  const isCurrent = currentSlot?.id === slot.id;
                  return (
                    <button key={slot.id} onClick={() => startCheckin(slot)}
                      style={{...S.slotCard, ...(isCurrent ? S.slotCardActive : {}), ...(done ? S.slotCardDone : {})}}>
                      <span style={S.slotEmoji}>{slot.emoji}</span>
                      <div style={S.slotLabel}>{slot.label}</div>
                      <div style={S.slotDesc}>{slot.description}</div>
                      {done && <div style={S.doneBadge}>✓ 기록됨</div>}
                      {isCurrent && !done && <div style={S.currentBadge}>지금</div>}
                    </button>
                  );
                })}
              </div>
              <button style={S.weeklyBtn} onClick={() => setView("weekly")}>📊 주간 비교 보기</button>
            </div>
          </div>
        );
      }

      if (view === "checkin" && activeSlot) {
        const canNext = currentAnswer.trim().length > 0;
        return (
          <div style={S.root}>
            <div style={S.page}>
              <button style={S.backBtn} onClick={() => setView("home")}>← 홈</button>
              <div style={S.checkinTop}>
                <div style={S.slotBadge}>{activeSlot.emoji} {activeSlot.label}</div>
                <div style={S.progressBar}><div style={S.progressFill(progressPct)} /></div>
                <div style={S.stepCount}>{step + 1} / {activeSlot.questions.length}</div>
              </div>
              <div style={S.questionBox}>
                <div style={S.questionText}>{activeSlot.questions[step]}</div>
              </div>
              <div style={{marginBottom: 20}}>
                <textarea style={S.textarea} value={currentAnswer}
                  onChange={e => setCurrentAnswer(e.target.value)}
                  onKeyDown={e => { if (e.key==="Enter" && !e.shiftKey && canNext) { e.preventDefault(); nextStep(); }}}
                  placeholder="분석하지 말고, 지금 느끼는 대로..." autoFocus />
              </div>
              <button style={S.nextBtn(!canNext)} onClick={nextStep} disabled={!canNext}>
                {step + 1 >= activeSlot.questions.length ? "마무리" : "다음 →"}
              </button>
            </div>
          </div>
        );
      }

      if (view === "done" && activeSlot) {
        return (
          <div style={S.root}>
            <div style={S.page}>
              <div style={S.doneCenter}>
                <div style={S.doneEmoji}>{activeSlot.emoji}</div>
                <div style={S.doneTitle}>기록됐어</div>
                <div style={S.doneSub}>오늘 {activeSlot.label}의 감각</div>
                <div style={S.answerList}>
                  {activeSlot.questions.map((q, i) => (
                    <div key={i} style={S.answerItem}>
                      <div style={S.answerQ}>{q}</div>
                      <div style={S.answerA}>{answers[i]}</div>
                    </div>
                  ))}
                </div>
                <button style={S.homeBtn} onClick={() => setView("home")}>홈으로</button>
              </div>
            </div>
          </div>
        );
      }

      if (view === "weekly") {
        const { monday: cMon } = getWeekRange(0);
        const { monday: pMon } = getWeekRange(-1);
        const slot = SLOTS.find(s => s.id === compareSlot);
        function getWeekDays(monday, data) {
          return Array.from({length:7}, (_,i) => {
            const d = new Date(monday); d.setDate(monday.getDate() + i);
            const dk = dateKey(d);
            return { date: d, entry: data[dk]?.[compareSlot] };
          });
        }
        const currentDays = getWeekDays(cMon, weeklyData.current);
        const previousDays = getWeekDays(pMon, weeklyData.previous);
        const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;

        function WeekDay({ date, entry }) {
          const [open, setOpen] = useState(false);
          return (
            <div style={S.weekDay} onClick={() => entry && setOpen(!open)}>
              <div style={S.weekDayHeader}>
                <span style={S.weekDayLabel}>{fmt(date)} {DAYS[date.getDay()]}</span>
                {entry ? <span style={S.weekDayDone}>✓</span> : <span style={S.weekDayEmpty}>-</span>}
              </div>
              {open && entry && (
                <div style={S.weekDayBody}>
                  {slot.questions.map((q,i) => (
                    <div key={i}>
                      <div style={S.miniQ}>{q}</div>
                      <div style={S.miniA}>{entry.answers[i]}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        }

        return (
          <div style={S.root}>
            <div style={S.page}>
              <button style={S.backBtn} onClick={() => setView("home")}>← 홈</button>
              <div style={S.weeklyTitle}>주간 비교</div>
              <div style={S.slotTabs}>
                {SLOTS.map(s => (
                  <button key={s.id} onClick={() => setCompareSlot(s.id)}
                    style={{...S.tab, ...(compareSlot===s.id ? S.tabActive : {})}}>
                    {s.emoji} {s.label}
                  </button>
                ))}
              </div>
              <div style={S.compareGrid}>
                <div style={S.compareCol}>
                  <div style={S.colHeader}>이번 주</div>
                  {currentDays.map(({date, entry}) => <WeekDay key={dateKey(date)} date={date} entry={entry} />)}
                </div>
                <div style={S.divider} />
                <div style={S.compareCol}>
                  <div style={S.colHeader}>지난 주</div>
                  {previousDays.map(({date, entry}) => <WeekDay key={dateKey(date)} date={date} entry={entry} />)}
                </div>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
